<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Flávio Ciarallo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header class="site-header">
        <div class="top-bar" style="justify-content: center;">
            <a href="/"><img th:src="@{/images/logo.png}" alt="Logo" class="logo-img" style="margin: 0;"></a>
        </div>
    </header>

    <main class="content-area">
        <div class="header-com-voltar">
            <a href="/" class="botao-voltar">&#8592;</a>
            <h1 class="page-title" style="margin-bottom: 0;">Acessar Conta</h1>
        </div>

        <div class="auth-container">
            <h2>Bem-vindo de volta!</h2>
            
            <form th:action="@{/login}" method="post">
                
                <div th:if="${erro}" th:text="${erro}" style="color: red; font-weight: bold; margin-bottom: 15px;"></div>

                <input type="email" name="email" placeholder="Seu E-mail" class="auth-input" required>
                
                <input type="password" name="senha" placeholder="Sua Senha" class="auth-input" required>
                
                <button type="submit" class="auth-btn">Entrar</button>
            </form>
            
            <div class="auth-links">
                <p>Esqueceu a senha? <a href="#">Recuperar</a></p>
                <p>Ainda não tem conta? <a href="/registro">Criar uma agora</a></p>
            </div>
        </div>
    </main>
</body>
</html>
