<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - Flávio Ciarallo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header class="site-header">
        <div class="top-bar" style="justify-content: center;">
            <a href="/"><img th:src="@{/images/logo.png}" alt="Logo" class="logo-img" style="margin: 0;"></a>
        </div>
    </header>

    <main class="content-area">
        <h1 class="page-title" style="text-align: center;">Pacientes Cadastrados</h1>
        
        <div class="auth-container" style="max-width: 800px;"> <table style="width: 100%; border-collapse: collapse; text-align: left; margin-bottom: 20px;">
                <tr style="background-color: var(--cor-primaria); color: white;">
                    <th style="padding: 10px;">ID</th>
                    <th style="padding: 10px;">Nome</th>
                    <th style="padding: 10px;">E-mail</th>
                    <th style="padding: 10px;">Senha</th>
                </tr>
                
                <tr th:each="user : ${listaUsuarios}" style="border-bottom: 1px solid #ccc;">
                    <td style="padding: 10px;" th:text="${user.id}">1</td>
                    <td style="padding: 10px; font-weight: bold;" th:text="${user.nome}">Nome</td>
                    <td style="padding: 10px;" th:text="${user.email}">E-mail</td>
                    <td style="padding: 10px;" th:text="${user.senha}">Senha</td>
                </tr>
            </table>

            <a href="/" class="auth-btn" style="text-decoration: none; display: inline-block; width: auto; padding: 10px 30px;">Voltar ao Site</a>
        </div>
    </main>
</body>
</html>
